<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Art Converter</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <a href="/" class="back-btn">&#8592; Späť</a>

  <!-- Particle canvas for easter egg -->
  <canvas id="particleCanvas"></canvas>

  <!-- Ambient blobs — colored live by JS -->
  <div class="blob blob1" id="blob1"></div>
  <div class="blob blob2" id="blob2"></div>
  <div class="blob blob3" id="blob3"></div>
  <div class="blob blob4" id="blob4"></div>

  <!-- App shell -->
  <div class="shell">

    <div class="app-header">
      <div class="logo-pixels">
        <div class="lp-row"><div class="lp on"></div><div class="lp"></div><div class="lp on"></div><div class="lp"></div><div class="lp on"></div></div>
        <div class="lp-row"><div class="lp"></div><div class="lp on"></div><div class="lp"></div><div class="lp on"></div><div class="lp"></div></div>
        <div class="lp-row"><div class="lp on"></div><div class="lp"></div><div class="lp on"></div><div class="lp"></div><div class="lp on"></div></div>
      </div>
      <h1>PIXEL ART <em>CONVERTER</em></h1>
      <p class="tagline">Zmeň akýkoľvek obrázok na pixel art — priamo v prehliadači</p>
    </div>

    <div class="workspace">

      <!-- LEFT: Controls -->
      <aside class="panel ctrl-panel" id="ctrlPanel">
        <div class="panel-inner">

          <div class="upload-zone" id="uploadZone">
            <input type="file" id="fileInput" accept="image/*" hidden>
            <div class="upload-gfx">
              <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
                <rect x="3"  y="3"  width="8" height="8" fill="currentColor" opacity="0.9"/>
                <rect x="14" y="3"  width="8" height="8" fill="currentColor" opacity="0.5"/>
                <rect x="25" y="3"  width="8" height="8" fill="currentColor" opacity="0.2"/>
                <rect x="3"  y="14" width="8" height="8" fill="currentColor" opacity="0.5"/>
                <rect x="14" y="14" width="8" height="8" fill="currentColor"/>
                <rect x="25" y="14" width="8" height="8" fill="currentColor" opacity="0.5"/>
                <rect x="3"  y="25" width="8" height="8" fill="currentColor" opacity="0.2"/>
                <rect x="14" y="25" width="8" height="8" fill="currentColor" opacity="0.5"/>
                <rect x="25" y="25" width="8" height="8" fill="currentColor" opacity="0.9"/>
              </svg>
            </div>
            <p class="uz-title">Pretiahni obrázok sem</p>
            <p class="uz-sub">alebo klikni pre výber</p>
            <span class="uz-formats">PNG · JPG · WEBP · GIF</span>
          </div>

          <div class="ctrl-block">
            <div class="ctrl-row">
              <span class="ctrl-label">Veľkosť pixelov</span>
              <span class="ctrl-badge" id="pixelSizeVal">10px</span>
            </div>
            <input type="range" id="pixelSize" min="2" max="100" value="10" step="1">
            <div class="range-hints"><span>Jemné</span><span>Hrubé</span></div>
          </div>

          <div class="ctrl-block">
            <div class="ctrl-row">
              <span class="ctrl-label">Kontrast</span>
              <span class="ctrl-badge" id="contrastVal">100%</span>
            </div>
            <input type="range" id="contrastSlider" min="50" max="200" value="100" step="1">
            <div class="range-hints"><span>Nízky</span><span>Vysoký</span></div>
          </div>

          <div class="ctrl-block">
            <span class="ctrl-label">Dithering</span>
            <div class="dither-row">
              <button class="seg-btn active" data-dither="none">Vyp.</button>
              <button class="seg-btn" data-dither="bayer">Bayer</button>
              <button class="seg-btn" data-dither="floyd">Floyd-S</button>
            </div>
          </div>

          <div class="ctrl-block">
            <span class="ctrl-label">Farebná paleta</span>
            <div class="palette-grid">
              <button class="pal-btn active" data-palette="original"><span class="psw original-sw"></span>Originál</button>
              <button class="pal-btn" data-palette="retro"><span class="psw retro-sw"></span>Retro</button>
              <button class="pal-btn" data-palette="grayscale"><span class="psw gray-sw"></span>Sivá</button>
              <button class="pal-btn" data-palette="neon"><span class="psw neon-sw"></span>Neon</button>
              <button class="pal-btn" data-palette="warm"><span class="psw warm-sw"></span>Teplá</button>
              <button class="pal-btn" data-palette="cool"><span class="psw cool-sw"></span>Studená</button>
            </div>
          </div>

          <button class="dl-btn" id="downloadBtn" disabled>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="1" y="1"  width="4" height="4" fill="currentColor"/>
              <rect x="6" y="1"  width="4" height="4" fill="currentColor" opacity="0.6"/>
              <rect x="11" y="1" width="4" height="4" fill="currentColor"/>
              <rect x="1" y="11" width="4" height="4" fill="currentColor"/>
              <rect x="6" y="11" width="4" height="4" fill="currentColor" opacity="0.6"/>
              <rect x="11" y="11" width="4" height="4" fill="currentColor"/>
              <rect x="3" y="6"  width="10" height="4" fill="currentColor" opacity="0.8"/>
            </svg>
            Stiahnuť PNG
          </button>

        </div>
      </aside>

      <!-- RIGHT: Preview -->
      <section class="panel preview-panel" id="previewPanel">
        <div class="panel-inner" style="display:flex;flex-direction:column;height:100%;">
          <div class="preview-header">
            <span class="preview-label">Náhľad výsledku</span>
            <span class="preview-meta" id="previewMeta"></span>
          </div>
          <div class="canvas-area" id="canvasArea">
            <div class="empty-state" id="emptyState">
              <div class="ep-grid">
                <div class="ep-row"><div class="ep"></div><div class="ep lit"></div><div class="ep"></div><div class="ep lit"></div></div>
                <div class="ep-row"><div class="ep lit"></div><div class="ep"></div><div class="ep lit"></div><div class="ep"></div></div>
                <div class="ep-row"><div class="ep"></div><div class="ep lit"></div><div class="ep"></div><div class="ep lit"></div></div>
                <div class="ep-row"><div class="ep lit"></div><div class="ep"></div><div class="ep lit"></div><div class="ep"></div></div>
              </div>
              <p>Nahraj obrázok a uvidíš výsledok tu</p>
            </div>
            <canvas id="canvas" hidden></canvas>
          </div>
        </div>
      </section>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
